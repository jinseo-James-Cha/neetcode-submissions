name: Daily Commit Slack Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Extract Info
        id: info
        shell: bash
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.actor }}"
          DATE=$(date +%F)
          
          # 슬러그 추출
          SLUG=$(echo "$COMMIT_MESSAGE" | sed -E 's/^Add:[[:space:]](.*) - submission-[0-9]+$/\1/')
          
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Update README
        id: update_readme
        run: |
          SLUG="${{ steps.info.outputs.slug }}"
          REPO_URL="https://github.com/${{ github.repository }}/tree/main/Data%20Structures%20%26%20Algorithms"
          
          # Check if the problem is already in the README
          if ! grep -q "$SLUG" README.md; then
            # Append the new problem link to the very bottom of the README
            echo "* [$SLUG]($REPO_URL/$SLUG)" >> README.md
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: auto-add $SLUG"
            git push
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Slack Notification
        if: steps.update_readme.outputs.updated == 'true'
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_D_C }}
        run: |
          BASE_MESSAGE="✅ ${{ steps.info.outputs.date }} Completed

          👤 ${{ steps.info.outputs.author }}

          📝 neetcode: https://neetcode.io/problems/${{ steps.info.outputs.slug }}"

          PAYLOAD=$(jq -n --arg text "$BASE_MESSAGE" '{text: $text}')

          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$WEBHOOK"