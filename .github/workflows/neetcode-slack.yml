name: Daily Commit Slack Notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Extract Info
        id: info
        shell: bash
        run: |
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          AUTHOR="${{ github.actor }}"
          DATE=$(date +%F)
          
          # 커밋 메시지에서 slug 추출 (Add: ... - submission-...)
          # 예: "Add: is-anagram - submission-0" -> "is-anagram"
          SLUG=$(echo "$COMMIT_MESSAGE" | sed -E 's/^Add:[[:space:]](.*) - submission-[0-9]+$/\1/')
          
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Send Slack Notification
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL_D_C }}
        run: |
          BASE_MESSAGE="
          ✅ ${{ steps.info.outputs.date }} Completed

          👤 ${{ steps.info.outputs.author }}

          📝 neetcode: https://neetcode.io/problems/${{ steps.info.outputs.slug }}"

          PAYLOAD=$(jq -n --arg text "$BASE_MESSAGE" '{text: $text}')

          curl -s \
            -X POST \
            -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "$WEBHOOK"

          echo "Slack notification sent."